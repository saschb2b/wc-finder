name: Weekly Data Update

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update-osm-data:
    name: Update OSM Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch fresh OSM data
        run: npx tsx scripts/fetch-overpass-toilets.ts
        continue-on-error: true

      - name: Fetch fuel stations
        run: npx tsx scripts/fetch-fuel-germany.ts
        continue-on-error: true

      - name: Merge all sources
        run: npx tsx scripts/merge-sources.ts

      - name: Split into tiles
        run: npx tsx scripts/split-tiles.ts

      - name: Generate tile loader
        run: npx tsx scripts/gen-tile-loader.ts

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "data: Weekly OSM data update"
          title: "🔄 Weekly Data Update - ${{ github.run_id }}"
          body: |
            Automated data update from OpenStreetMap.

            ### Changes
            - Fresh OSM wheelchair-accessible toilets
            - Updated fuel station locations
            - Merged and deduplicated with existing data

            ### Verification
            - [ ] Review tile counts
            - [ ] Check city coverage (Hannover, Dortmund, etc.)
            - [ ] Verify no data loss

            Auto-generated by GitHub Actions.
          branch: data/update-${{ github.run_id }}
          delete-branch: true

  notify-discord:
    name: Notify on Discord
    needs: update-osm-data
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚽 WC Finder Data Update
            Status: ${{ needs.update-osm-data.result }}
            Run: ${{ github.run_id }}
            ${{ needs.update-osm-data.result == 'success' && '✅ Check the new PR' || '❌ Update failed' }}
